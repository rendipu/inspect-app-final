<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ✅ FIX LCP: preload logo (elemen pertama di layar) -->
  <link rel="preload" as="image" href="/logo/mineinspect-crane.webp" type="image/webp" fetchpriority="high" />

  <!-- ✅ FIX RENDER BLOCKING: preconnect sebelum font request -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=optional" />
  </noscript>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/icons/site.webmanifest" />

  <!-- SEO -->
  <title>MineInspect — Sistem Inspeksi Alat Berat Tambang</title>
  <meta name="description"
    content="MineInspect adalah sistem inspeksi digital untuk heavy equipment tambang batubara. Safety, reliability, dan efisiensi operasional unit." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mineinspect.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:title" content="MineInspect — Sistem Inspeksi Alat Berat Tambang" />
  <meta property="og:description" content="Digital inspection system untuk alat berat tambang." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mineinspect.vercel.app/" />
  <meta property="og:image" content="https://mineinspect.vercel.app/logo/mineinspect-crane.png" />

  <!-- PWA -->
  <meta name="theme-color" content="#f59e0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MineInspect" />
  <meta name="format-detection" content="telephone=no" />

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{
      background:#fafaf7;color:#1c1917;
      font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
      font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    }
  </style>

  <!-- Structured Data -->
  <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"SoftwareApplication","name":"MineInspect","operatingSystem":"Web,Android,iOS","applicationCategory":"BusinessApplication","description":"Sistem inspeksi digital untuk alat berat tambang.","url":"https://mineinspect.vercel.app/"}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
